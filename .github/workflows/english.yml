name: Danial Daily English

on:
  schedule:
    - cron: "0 7 * * *" # 매일 한국시간 오후 4시(UTC 07:00)에 완전 자동 실행!
  workflow_dispatch: # 아빠가 원할 때 언제든 '수동 실행 버튼'을 누를 수 있는 기능!

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 가져오기
        uses: actions/checkout@v3

      - name: 파이썬 설치
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: AI 및 디스코드 배달부(requests) 설치
        run: |
          pip install google-generativeai requests

      - name: 🤖 데일리 영어 로봇 자동 실행!
        env:
          SCIENCE_KEY: ${{ secrets.SCIENCE_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python english_agent.py

      - name: 만들어진 리포트 깃허브에 자동 저장
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add english_*.html
          git commit -m "오늘의 데일리 영어 생성 완료" || echo "변화 없음"
          git push
