name: Danial Science Report Update

on:
  schedule:
    - cron: '0 0 * * 6' # 한국 시간 매주 토요일 오전 9시
  push:
    branches: [ main ] # 메인 브랜치에 올릴 때마다 테스트로 자동 실행
  workflow_dispatch: # 버튼 눌러서 수동으로도 실행 가능하게 함

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # GitHub Pages에 파일을 쓸 수 있는 권한 허용
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install google-genai google-api-python-client python-dotenv

      - name: Run Science Agent
        env:
          SCIENCE_KEY: ${{ secrets.SCIENCE_KEY }}
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_KEY }}
        run: python agent_test.py

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # 현재 폴더 전체를 배포
          branch: gh-pages # 결과물을 모아둘 브랜치 이름