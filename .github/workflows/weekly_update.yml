name: Danial Science Report Update

on:
  schedule:
    - cron: "0 0 * * 6"
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        # requests 라이브러리 추가됨!
        run: |
          pip install google-generativeai google-api-python-client python-dotenv requests

      - name: Run Science Agent
        env:
          SCIENCE_KEY: ${{ secrets.SCIENCE_KEY }}
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_KEY }}
          # 노션 열쇠 환경변수 추가됨!
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python agent_test.py

      - name: Commit and Push changes to Main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html danial_lab.html report_*.html lab_*.html history.json || echo "No new files to add"
          git commit -m "🚀 Auto-update: 주간 과학 리포트 자동 생성 및 노션 기록 완료" || echo "No changes to commit"
          git push origin main
