<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 다니엘의 변인 통제 실험실 🧊</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f0f9ff 0%, #c9e6ff 100%);
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            color: #333;
        }
        .container {
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 30px;
            max-width: 900px;
            width: 100%;
            text-align: center;
            border: 2px solid #a0d9ff;
        }
        h1 {
            color: #007bff;
            margin-bottom: 15px;
            font-size: 2em;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        h1 span {
            margin: 0 10px;
        }
        p {
            font-size: 1.1em;
            line-height: 1.6;
            color: #555;
            margin-bottom: 25px;
        }
        .experiment-setup {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .beaker {
            background-color: #e6f7ff;
            border: 1px solid #99ddff;
            border-radius: 15px;
            padding: 20px;
            flex: 1;
            min-width: 300px;
            text-align: left;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        .beaker h2 {
            color: #0056b3;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.4em;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #444;
        }
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #a0d9ff;
            border-radius: 8px;
            font-size: 1em;
            background-color: #ffffff;
            appearance: none; /* Remove default arrow */
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23007bff%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%01-13.2-5.6L146.2%20200.2%2018.8%2063.8c-5.4-5.4-14.2-5.4-19.6%200-5.4%205.4-5.4%2014.2%200%2019.6l136%20136c2.8%202.8%206.2%204.2%209.8%204.2s7-1.4%209.8-4.2l136-136c5.4-5.4%205.4-14.2%200-19.6-2.8-2.8-6.2-4.2-9.8-4.2z%22%2F%3E%3C%2Fsvg%3E');
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 12px;
            cursor: pointer;
        }
        button {
            background-color: #28a745;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
            margin-top: 20px;
        }
        button:hover {
            background-color: #218838;
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.3em;
            font-weight: bold;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            word-break: keep-all;
        }
        .result.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .result.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .result.info {
            background-color: #e2e3e5;
            color: #383d41;
            border: 1px solid #d6d8db;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪<span role="img" aria-label="beaker"></span> 다니엘의 변인 통제 실험실 <span role="img" aria-label="ice cube"></span>🧊</h1>
        <p>
            안녕하세요, 다니엘! 오늘은 '변인 통제'가 무엇인지 직접 실험을 설계하며 배워볼 거예요. <br>
            두 개의 비커에 담긴 음료수 중 <b>'무엇 때문에' 얼음이 녹는 시간이 달라지는지</b> 알아내려면 어떻게 해야 할까요? <br>
            아래 조건을 설정하고 '실험 시작!' 버튼을 눌러보세요!
        </p>

        <div class="experiment-setup">
            <div class="beaker">
                <h2>비커 1 🥤</h2>
                <div class="form-group">
                    <label for="liquid1">음료수 종류:</label>
                    <select id="liquid1">
                        <option value="물">💧 물</option>
                        <option value="콜라">🥤 콜라</option>
                        <option value="주스">🍊 주스</option>
                        <option value="우유">🥛 우유</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="volume1">음료수 양:</label>
                    <select id="volume1">
                        <option value="100ml">100ml</option>
                        <option value="200ml">200ml</option>
                        <option value="300ml">300ml</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="temp1">초기 온도:</label>
                    <select id="temp1">
                        <option value="5c">5°C (차가움)</option>
                        <option value="10c">10°C (보통)</option>
                        <option value="15c">15°C (미지근)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="ice1">얼음 크기:</label>
                    <select id="ice1">
                        <option value="small">작음 🧊</option>
                        <option value="medium">보통 🧊🧊</option>
                        <option value="large">큼 🧊🧊🧊</option>
                    </select>
                </div>
            </div>

            <div class="beaker">
                <h2>비커 2 🍹</h2>
                <div class="form-group">
                    <label for="liquid2">음료수 종류:</label>
                    <select id="liquid2">
                        <option value="물">💧 물</option>
                        <option value="콜라">🥤 콜라</option>
                        <option value="주스">🍊 주스</option>
                        <option value="우유">🥛 우유</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="volume2">음료수 양:</label>
                    <select id="volume2">
                        <option value="100ml">100ml</option>
                        <option value="200ml">200ml</option>
                        <option value="300ml">300ml</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="temp2">초기 온도:</label>
                    <select id="temp2">
                        <option value="5c">5°C (차가움)</option>
                        <option value="10c">10°C (보통)</option>
                        <option value="15c">15°C (미지근)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="ice2">얼음 크기:</label>
                    <select id="ice2">
                        <option value="small">작음 🧊</option>
                        <option value="medium">보통 🧊🧊</option>
                        <option value="large">큼 🧊🧊🧊</option>
                    </select>
                </div>
            </div>
        </div>

        <button id="startButton">실험 시작! 🚀</button>

        <div id="result" class="result info">
            ⬆️ 위에서 실험 조건을 설정하고 '실험 시작!' 버튼을 눌러보세요!
        </div>
    </div>

    <script>
        document.getElementById('startButton').addEventListener('click', function() {
            const liquid1 = document.getElementById('liquid1').value;
            const volume1 = document.getElementById('volume1').value;
            const temp1 = document.getElementById('temp1').value;
            const ice1 = document.getElementById('ice1').value;

            const liquid2 = document.getElementById('liquid2').value;
            const volume2 = document.getElementById('volume2').value;
            const temp2 = document.getElementById('temp2').value;
            const ice2 = document.getElementById('ice2').value;

            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result'; // Reset classes

            let differentVariables = 0;
            let changedVariable = '';

            if (liquid1 !== liquid2) {
                differentVariables++;
                changedVariable = '음료수 종류';
            }
            if (volume1 !== volume2) {
                differentVariables++;
                changedVariable = '음료수 양';
            }
            if (temp1 !== temp2) {
                differentVariables++;
                changedVariable = '초기 온도';
            }
            if (ice1 !== ice2) {
                differentVariables++;
                changedVariable = '얼음 크기';
            }

            if (differentVariables === 1) {
                resultDiv.classList.add('success');
                resultDiv.innerHTML = `🎉 완벽한 변인 통제! <br> 이 실험은 <b>'${changedVariable}'</b>에 따른 얼음 녹는 시간을 공정하게 비교할 수 있어요!`;
            } else if (differentVariables > 1) {
                resultDiv.classList.add('error');
                resultDiv.innerHTML = `🤔 잠깐! 너무 많은 것을 동시에 바꾸면 무엇 때문에 결과가 달라졌는지 알 수 없어요! <br> <b>딱 한 가지만 다르게</b> 설정해서 다시 시도해볼까요?`;
            } else { // differentVariables === 0
                resultDiv.classList.add('error');
                resultDiv.innerHTML = `🧐 음... 모든 조건이 똑같으면 비교할 게 없어요! <br> <b>무엇을 비교하고 싶은지 한 가지 조건을 다르게</b> 설정해볼까요?`;
            }
        });
    </script>
</body>
</html>
